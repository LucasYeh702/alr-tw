name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: ruff check .
      - name: Forbidden file check
        run: python scripts/check_no_forbidden_files.py
      - name: Public boundary check
        run: python scripts/check_public_boundary.py
      - name: Test and example trace validation
        run: pytest
